<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cosmo Jump — Space Runner 2026</title>
    <meta name="description" content="Cosmo Jump: A 2D endless runner set in space. Collect coins, unlock trails and themes, and compete with friends!">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ═══════════════ HUD ═══════════════ -->
    <div class="hud" id="hud">
        <div class="hud-stats">
            <div class="score-box">🪙 <span id="scoreVal">0</span></div>
            <div class="score-box points-box">⚡ <span id="pointsVal">0</span></div>
        </div>
        <button id="pauseBtn" class="pause-btn" onclick="togglePause()" aria-label="Pause game">❚❚</button>
    </div>

    <!-- ═══════════════ WELCOME SCREEN ═══════════════ -->
    <div id="welcome" class="overlay">
        <h1>Cosmo Jump</h1>
        <p class="tagline">Endless runner among the stars ✦</p>

        <div class="username-section">
            <div class="input-wrapper">
                <span class="input-icon">👤</span>
                <input type="text" id="usernameInput" placeholder="Enter your username" maxlength="20" autocomplete="off" spellcheck="false">
            </div>
            <span id="loginStatus" class="login-status"></span>
        </div>

        <!-- Mini leaderboard on welcome screen -->
        <div id="welcomeLeaderboard" class="leaderboard-section mini" style="display:none;">
            <span class="leaderboard-title">🏆 Top Players</span>
            <div id="welcomeLbList" class="leaderboard-list"></div>
        </div>

        <button class="btn" id="startBtn" onclick="startGame()">Start Mission</button>
    </div>

    <!-- ═══════════════ PAUSE OVERLAY ═══════════════ -->
    <div id="pauseOverlay" class="overlay" style="display:none;">
        <h1>Paused</h1>
        <button class="btn btn-ready" onclick="togglePause()">Resume</button>
    </div>

    <!-- ═══════════════ GAME OVER SCREEN ═══════════════ -->
    <div id="gameOver" class="overlay" style="display:none;">
        <h1 class="gameover-title">System Crash</h1>

        <!-- New high score banner -->
        <div id="highScoreBanner" class="high-score-banner" style="display:none;">
            🎉 NEW HIGH SCORE! 🎉
        </div>

        <div class="currency-display">
            <div class="currency-card points-card">
                <span class="currency-icon">⚡</span>
                <div class="currency-info">
                    <span class="currency-label">POINTS</span>
                    <span id="pointsEarned" class="currency-value">0</span>
                </div>
            </div>
            <div class="currency-card earned">
                <span class="currency-icon">✦</span>
                <div class="currency-info">
                    <span class="currency-label">COINS</span>
                    <span id="earnedVal" class="currency-value">0</span>
                </div>
            </div>
            <div class="currency-card balance">
                <span class="currency-icon">◈</span>
                <div class="currency-info">
                    <span class="currency-label">BALANCE</span>
                    <span id="balanceVal" class="currency-value">0</span>
                </div>
            </div>
        </div>

        <!-- Full leaderboard on game over -->
        <div id="gameOverLeaderboard" class="leaderboard-section">
            <span class="leaderboard-title">🏆 Leaderboard</span>
            <div id="gameOverLbList" class="leaderboard-list"></div>
        </div>

        <div class="shop-section">
            <span class="shop-label">Aura Trails</span>
            <div id="trailShop" class="grid"></div>

            <span class="shop-label">Core Themes</span>
            <div id="themeShop" class="grid"></div>
        </div>

        <button class="btn btn-ready" onclick="resetGame()">Reboot</button>
    </div>

    <!-- ═══════════════ CANVAS ═══════════════ -->
    <canvas id="game"></canvas>

    <script src="script.js"></script>
</body>
</html>
